<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --accent: #00e5a0;
      --font-mono: 'Space Mono', monospace;
      --font-display: 'Syne', sans-serif;
    }

    body {
      background: #0a0c0f;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    /* Perfect vierkant voor cirkel crop */
    .profile-frame {
      width: 500px;
      height: 500px;
      background: #0a0c0f;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Subtiele achtergrond glow */
    .profile-frame::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0, 229, 160, 0.08) 0%, transparent 70%);
      border-radius: 50%;
    }

    .nav-logo {
      display: flex;
      flex-direction: column;
      line-height: 1;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .logo-main {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .logo-bracket {
      font-size: 5rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      font-family: var(--font-mono);
      letter-spacing: 0;
      margin: 0 -0.7rem;
      filter: drop-shadow(0 0 10px rgba(0, 229, 160, 0.4));
    }

    .logo-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 5rem;
      overflow: visible;
    }

    .logo-big {
      font-size: 3.8rem;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      font-family: var(--font-display);
      margin: auto 0;
    }

    .logo-bottom {
      font-family: var(--font-display);
      font-weight: 900;
      letter-spacing: 0rem;
      font-size: 1.6rem;
      color: #fff;
      line-height: 0.1;
      align-self: center;
      margin-bottom: 0.15rem;
    }

    .nav-tagline {
      font-size: 0.5rem;
      letter-spacing: 0.25em;
      color: #fff;
      display: block;
      font-weight: 500;
      font-family: var(--font-display);
      margin-top: 0.6rem;
      text-align: center;
      position: relative;
    }

    .nav-tagline .accent {
      color: var(--accent);
      text-shadow: 0 0 8px rgba(0, 229, 160, 0.8);
    }

    .accent { color: var(--accent); }
  </style>
</head>
<body>
  <div class="profile-frame">
    <span class="nav-logo">
      <span class="logo-main">
        <span class="logo-bracket accent">[</span>
        <span class="logo-block">
          <span class="logo-big">M</span>
          <span class="logo-bottom">can</span>
        </span>
        <span class="logo-bracket accent">]</span>
      </span>
      <span class="nav-tagline">COOK<span class="accent">.</span> BAKE<span class="accent">.</span> BREAK<span class="accent">.</span></span>
    </span>
  </div>
</body>
</html>
